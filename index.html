<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Request System v8.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .table-container { overflow-x: auto; max-height: 60vh; border-radius: 16px; background: white; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th { position: sticky; top: 0; z-index: 30; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; font-weight: 800; white-space: nowrap; }
        .sticky-left { position: sticky; left: 0; z-index: 25; background-color: white; border-right: 1px solid #e2e8f0 !important; }
        input, select { border: none; background: transparent; width: 100%; height: 100%; padding: 12px 10px; font-size: 13px; font-weight: 600; }
        input:focus { outline: none; background-color: #f1f5f9; }
        td { border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; padding: 0; }
        .btn-tab { transition: all 0.3s ease; border-bottom: 3px solid transparent; color: #94a3b8; }
        .btn-tab.active { border-bottom-color: #4f46e5; color: #4f46e5; }
        .loader { border: 2px solid #f3f3f3; border-radius: 50%; border-top: 2px solid #ffffff; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6">

    <header class="mb-8 flex flex-col lg:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-5">
            <div id="brand-logo" class="bg-indigo-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl font-black text-xl shadow-xl transition-all">HM</div>
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-extrabold text-slate-900">Article Request</h1>
                    <select id="brandSelector" onchange="initBrandMode()" class="bg-slate-100 rounded-lg px-2 py-1 text-xs font-bold text-slate-600 outline-none">
                        <option value="HEYMALE">HEYMALE</option>
                        <option value="HEYLOCAL">HEYLOCAL</option>
                    </select>
                </div>
                <p class="text-slate-500 text-xs font-medium">Integrasi: Cloud Sync Active</p>
            </div>
        </div>
        
        <div class="flex gap-3">
            <button onclick="addRow()" class="bg-white border border-slate-200 text-slate-700 px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-50 transition-all">Tambah Baris</button>
            <button id="saveBtn" onclick="saveToGSheet()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg hover:bg-indigo-700 transition-all">Simpan ke GSheet</button>
        </div>
    </header>

    <nav class="flex gap-8 mb-6 border-b border-slate-200">
        <button onclick="switchView('offline')" id="tab-offline" class="btn-tab active pb-2 text-sm font-bold uppercase">Dashboard Offline</button>
        <button onclick="switchView('online')" id="tab-online" class="btn-tab pb-2 text-sm font-bold uppercase">Request Online</button>
    </nav>

    <div class="table-container border border-slate-200 shadow-sm">
        <table id="articleTable">
            <thead>
                <tr id="header-row-1" class="bg-slate-900 text-white uppercase text-[9px] tracking-widest"></tr>
                <tr id="header-row-2" class="bg-slate-50 text-slate-400 font-bold border-b border-slate-200 text-[10px]"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const config = {
            HEYMALE: {
                ratioOn: 0.53, ratioOff: 0.47,
                stores: [
                    { name: "HEYMALE PADANG", r: 11.62 }, { name: "HEYMALE SUNGAI PENUH", r: 10.95 },
                    { name: "HEYMALE MAKASSAR", r: 10.81 }, { name: "HEYMALE PEKANBARU", r: 10.17 },
                    { name: "HEYMALE BXC", r: 9.89 }, { name: "HEYMALE ACEH", r: 9.75 },
                    { name: "HEYMALE PURI", r: 9.47 }, { name: "HEYMALE SUN PLAZA MEDAN", r: 9.33 },
                    { name: "HEYMALE PIM", r: 8.99 }, { name: "HEYMALE PALEMBANG", r: 8.99 },
                    { name: "HEYMALE PASKAL BANDUNG", r: 8.99 }, { name: "HEYMALE SEMARANG", r: 8.99 },
                    { name: "HEYMALE MUKU SURABAYA", r: 8.99, isMuku: true }, { name: "HEYMALE MUKU BLOK M", r: 8.99, isMuku: true }
                ]
            },
            HEYLOCAL: {
                ratioOn: 0.5383, ratioOff: 0.4617,
                stores: [
                    { name: "HEYLOCAL ACEH", r: 7.98 }, { name: "HEYLOCAL BALIKPAPAN", r: 5.59 },
                    { name: "HEYLOCAL BXC", r: 6.78 }, { name: "HEYLOCAL MAKASSAR", r: 4.79 },
                    { name: "HEYLOCAL MEDAN OCBC", r: 4.19 }, { name: "HEYLOCAL PADANG", r: 8.78 },
                    { name: "HEYLOCAL PAKUWON MALL BEKASI", r: 4.79 }, { name: "HEYLOCAL PALEMBANG", r: 6.98 },
                    { name: "HEYLOCAL PEJATEN", r: 4.79 }, { name: "HEYLOCAL PEKANBARU", r: 5.39 },
                    { name: "HEYLOCAL SAMARINDA", r: 4.79 }, { name: "HEYLOCAL SENTUL", r: 4.39 },
                    { name: "HEYLOCAL BANDUNG", r: 4.39 }, { name: "HEYLOCAL SUMMARECON MALL BEKASI", r: 3.79 },
                    { name: "HEYLOCAL SUNGAI PENUH", r: 3.59 }, { name: "HEYLOCAL SUN PLAZA MEDAN", r: 4.79 },
                    { name: "HEYLOCAL PIM", r: 5.59 }, { name: "HEYLOCAL WH SURABAYA", r: 4.79 },
                    { name: "HEYLOCAL LAMPUNG", r: 3.85 }, { name: "HEYLOCAL JAMBI", r: 3.85 }
                ]
            }
        };

        let currentBrand = 'HEYMALE';
        let currentView = 'offline';
        let rowDataStorage = {};

        function initBrandMode() {
            currentBrand = document.getElementById('brandSelector').value;
            const logo = document.getElementById('brand-logo');
            logo.innerText = currentBrand === 'HEYMALE' ? 'HM' : 'HL';
            logo.className = currentBrand === 'HEYMALE' ? 'bg-indigo-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl font-black text-xl shadow-xl' : 'bg-rose-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl font-black text-xl shadow-xl';
            
            renderHeaders();
            document.getElementById('tableBody').innerHTML = '';
            rowDataStorage = {};
            for(let i=0; i<5; i++) addRow();
        }

        function renderHeaders() {
            const stores = config[currentBrand].stores;
            const h1 = document.getElementById('header-row-1');
            const h2 = document.getElementById('header-row-2');
            
            h1.innerHTML = `<th colspan="8" class="px-4 py-4 sticky-left bg-slate-950">Info Artikel</th>
                            <th class="bg-blue-600 px-2 py-4">PO</th>
                            <th class="bg-indigo-700 px-2 py-4">ON</th>
                            <th class="bg-orange-600 px-2 py-4">OFF</th>
                            <th colspan="${stores.length}" class="bg-emerald-700 px-4 py-4 border-l border-emerald-800 text-center">Dashboard Distribusi</th>
                            <th colspan="3" class="bg-slate-800 px-2 py-4">Verifikasi</th><th></th>`;

            let html2 = `<th class="px-4 py-3 sticky-left min-w-[100px]">Brand</th><th class="px-4 py-3 min-w-[100px]">Kode</th><th class="px-4 py-3 min-w-[130px]">SKU</th><th class="px-4 py-3 min-w-[180px]">Nama</th><th class="px-4 py-3 min-w-[120px]">Kategori</th><th class="px-4 py-3 min-w-[70px]">Size</th><th class="px-4 py-3 min-w-[110px]">Price</th><th class="px-4 py-3 min-w-[100px]">Color</th><th class="px-4 py-3 bg-blue-50 text-blue-800">PO</th><th class="px-4 py-3 bg-indigo-50 text-indigo-800">ON</th><th class="px-4 py-3 bg-orange-50 text-orange-800">OFF</th>`;
            stores.forEach(s => {
                html2 += `<th class="px-2 py-3 bg-slate-50 text-slate-600 border-l border-slate-200 text-[9px] min-w-[80px]">${s.name.replace(currentBrand + ' ', '')}</th>`;
            });
            html2 += `<th class="px-4 py-3 bg-slate-100 text-slate-800 border-l border-slate-200">TOTAL</th><th class="px-4 py-3 bg-green-50 text-green-700">STOCK</th><th class="px-4 py-3 bg-red-50 text-red-700">SISA</th><th></th>`;
            h2.innerHTML = html2;
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('tab-offline').classList.toggle('active', view === 'offline');
            document.getElementById('tab-online').classList.toggle('active', view === 'online');
            Object.keys(rowDataStorage).forEach(refreshRowUI);
        }

        function addRow() {
            const rowId = Math.random().toString(36).substr(2, 9);
            const tr = document.createElement('tr');
            tr.id = `row-${rowId}`;
            const stores = config[currentBrand].stores;
            rowDataStorage[rowId] = { off: new Array(stores.length).fill(0), on: new Array(stores.length).fill(0) };
            
            let storeCells = "";
            stores.forEach((_, i) => {
                storeCells += `<td><input type="number" id="store-${i}-${rowId}" oninput="updateManual('${rowId}', ${i})" class="text-center font-bold text-slate-700" value="0"></td>`;
            });

            const catOptions = (currentBrand === 'HEYLOCAL' ? ['SCARF', 'SHIRT', 'PANTS'] : ['SHIRT', 'PANTS', 'JACKET']).map(c => `<option value="${c}">${c}</option>`).join('');

            tr.innerHTML = `<td class="sticky-left"><input type="text" value="${currentBrand}" class="font-bold"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><select onchange="calculateRow('${rowId}')" id="cat-${rowId}">${catOptions}</select></td><td><input type="text" class="text-center"></td><td><input type="number"></td><td><input type="text"></td><td class="bg-blue-50/30"><input type="number" id="qty-${rowId}" oninput="calculateRow('${rowId}')" class="font-black text-blue-700 text-center"></td><td id="online-${rowId}" class="text-center font-bold text-indigo-700">0</td><td id="offline-${rowId}" class="text-center font-bold text-orange-700">0</td>${storeCells}<td id="total-${rowId}" class="text-center font-bold">0</td><td id="stock-${rowId}" class="text-center text-green-600 font-bold bg-green-50">0</td><td id="sisa-${rowId}" class="text-center text-red-600 font-bold bg-red-50">0</td><td><button onclick="removeRow('${rowId}')" class="text-slate-300 hover:text-red-500 font-bold">×</button></td>`;
            document.getElementById('tableBody').appendChild(tr);
        }

        function calculateRow(rowId) {
            const brandData = config[currentBrand];
            const qtyPo = parseInt(document.getElementById(`qty-${rowId}`).value) || 0;
            const qtyOn = Math.round(qtyPo * brandData.ratioOn);
            const qtyOff = qtyPo - qtyOn;
            
            document.getElementById(`online-${rowId}`).innerText = qtyOn;
            document.getElementById(`offline-${rowId}`).innerText = qtyOff;

            let offResults = new Array(brandData.stores.length).fill(0);
            let onResults = new Array(brandData.stores.length).fill(0);
            
            // Logika Distribusi Sederhana untuk Website
            brandData.stores.forEach((s, i) => {
                offResults[i] = Math.floor(qtyOff * (s.r / 100));
                onResults[i] = s.isMuku ? Math.floor(qtyOn * 0.5) : 0; 
            });

            rowDataStorage[rowId].off = offResults;
            rowDataStorage[rowId].on = onResults;
            refreshRowUI(rowId);
        }

        function updateManual(rowId, idx) {
            const val = parseInt(document.getElementById(`store-${idx}-${rowId}`).value) || 0;
            if (currentView === 'offline') rowDataStorage[rowId].off[idx] = val;
            else rowDataStorage[rowId].on[idx] = val;
            updateTotals(rowId);
        }

        function refreshRowUI(rowId) {
            const data = currentView === 'offline' ? rowDataStorage[rowId].off : rowDataStorage[rowId].on;
            data.forEach((v, i) => { document.getElementById(`store-${i}-${rowId}`).value = v; });
            updateTotals(rowId);
        }

        function updateTotals(rowId) {
            const data = currentView === 'offline' ? rowDataStorage[rowId].off : rowDataStorage[rowId].on;
            const sum = data.reduce((a, b) => a + b, 0);
            const target = parseInt(document.getElementById(currentView === 'offline' ? `offline-${rowId}` : `online-${rowId}`).innerText) || 0;
            document.getElementById(`total-${rowId}`).innerText = sum;
            document.getElementById(`stock-${rowId}`).innerText = sum;
            const sisa = target - sum;
            const sc = document.getElementById(`sisa-${rowId}`);
            sc.innerText = sisa;
            sc.className = `text-center font-bold ${sisa !== 0 ? 'bg-red-600 text-white' : 'bg-red-50 text-red-600'}`;
        }

        function removeRow(id) { document.getElementById(`row-${id}`).remove(); delete rowDataStorage[id]; }

        async function saveToGSheet() {
            const scriptUrl = document.getElementById('scriptUrl').value;
            // NAMA SHEET DINAMIS: PARUNG HEYMALE atau PARUNG HEYLOCAL
            const targetSheet = (currentView === 'offline' ? 'PARUNG ' : 'MALATEK ') + currentBrand;
            
            const rows = Array.from(document.querySelectorAll('#tableBody tr'));
            const dataToSave = rows.map(tr => {
                const rId = tr.id.split('-')[1];
                const inputs = tr.querySelectorAll('input, select');
                const rowData = {
                    "timestamp": new Date().toLocaleString('id-ID'),
                    "brand": currentBrand,
                    "kode_tag": inputs[1].value,
                    "sku_product": inputs[2].value,
                    "name_tag": inputs[3].value,
                    "kategori": inputs[4].value,
                    "size": inputs[5].value,
                    "price": inputs[6].value,
                    "color": inputs[7].value,
                    "qty_po": inputs[8].value,
                    "online": document.getElementById(`online-${rId}`).innerText,
                    "offline": document.getElementById(`offline-${rId}`).innerText
                };
                config[currentBrand].stores.forEach((s, i) => {
                    rowData[s.name] = (currentView === 'offline' ? rowDataStorage[rId].off[i] : rowDataStorage[rId].on[i]);
                });
                return rowData;
            });

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = `<span class="loader"></span> Saving...`;
            try {
                await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ sheetName: targetSheet, data: dataToSave }) });
                alert(`Data berhasil terkirim ke sheet ${targetSheet}!`);
            } catch (e) { alert('Gagal kirim data.'); }
            finally { btn.disabled = false; btn.innerText = `Simpan ke GSheet`; }
        }

        window.onload = initBrandMode;
    </script>
</body>
</html>
